# --- HTTP ---
quarkus.http.port=8082

# --- Datasource: H2 in-memory by default; switch to Postgres via OB_DB_KIND=postgresql ---
quarkus.datasource.db-kind=${OB_DB_KIND:h2}
quarkus.datasource.jdbc.url=${OB_DB_URL:jdbc:h2:mem:balabank;DB_CLOSE_DELAY=-1}
quarkus.datasource.username=${OB_DB_USER:sa}
quarkus.datasource.password=${OB_DB_PASSWORD:}
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Flyway seeds schema + sample data ---
quarkus.flyway.migrate-at-start=true

# --- JWT validation (tokens minted by consent-auth) ---
mp.jwt.verify.issuer=https://consent-auth.balabank.local
mp.jwt.verify.publickey.location=${OB_JWT_PUBLIC_KEY:jwt-signing.pub}

# --- OpenAPI ---
quarkus.smallrye-openapi.path=/openapi
mp.openapi.extensions.smallrye.info.title=Bala Bank Open Banking API
mp.openapi.extensions.smallrye.info.version=3.1.0
