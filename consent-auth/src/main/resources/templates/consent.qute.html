<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bala Bank — Authorise Access</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; color: #1a2b4a; }
        .card { border: 1px solid #dde3ec; border-radius: 12px; padding: 24px; }
        h1 { font-size: 1.3rem; } h2 { font-size: 1rem; margin-top: 20px; }
        label { display: block; margin: 6px 0; }
        input[type=text], input[type=password] { width: 100%; padding: 8px; margin: 4px 0 12px; }
        .btn { padding: 10px 18px; border: 0; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .approve { background: #1f6feb; color: #fff; } .deny { background: #eee; color: #333; }
        .muted { color: #6a7689; font-size: .85rem; }
    </style>
</head>
<body>
<div class="card">
    <h1>MohanaTPP requests access to your Bala Bank data</h1>
    <p class="muted">Sign in and choose exactly what to share. You can deselect any permission or account.</p>
    <form method="post" action="/authorize/decision">
        <input type="hidden" name="client_id" value="{clientId}">
        <input type="hidden" name="redirect_uri" value="{redirectUri}">
        <input type="hidden" name="state" value="{state}">
        <input type="hidden" name="consent_id" value="{consentId}">

        <h2>1. Sign in</h2>
        <label>Username <input type="text" name="username" autofocus></label>
        <label>Password <input type="password" name="password"></label>

        <h2>2. Permissions requested</h2>
        {#for p in permissions}
        <label><input type="checkbox" name="permissions" value="{p}" checked>
            {#if p == 'ReadAccountsDetail'}View your account details{#else if p == 'ReadBalances'}View your account balances{#else if p == 'ReadTransactionsDetail'}View your transactions{#else}{p}{/if}
            <span class="muted">({p})</span></label>
        {/for}

        <h2>3. Accounts to share</h2>
        <label><input type="checkbox" name="accounts" value="GB-ALICE-001" checked> GB-ALICE-001 (Alice Current)</label>
        <label><input type="checkbox" name="accounts" value="GB-ALICE-002"> GB-ALICE-002 (Alice Savings)</label>
        <label><input type="checkbox" name="accounts" value="GB-BOB-001"> GB-BOB-001 (Bob Current)</label>

        <div style="margin-top:20px">
            <button class="btn approve" name="decision" value="approve" type="submit">Approve</button>
            <button class="btn deny" name="decision" value="deny" type="submit">Deny</button>
        </div>
    </form>
</div>
</body>
</html>
