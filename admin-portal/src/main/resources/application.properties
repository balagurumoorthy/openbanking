quarkus.http.port=8090

# APISIX Admin API (tier source of truth) + Redis (live usage counters)
apisix.admin.url=${APISIX_ADMIN:http://localhost:9180}
apisix.admin.key=${APISIX_ADMIN_KEY:ob-admin-key-0001}
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
# Use the real APISIX Redis (limit-count counters), not an auto-started Dev Services Redis.
quarkus.redis.devservices.enabled=false

# The TPP consumer this portal manages (APISIX consumer username)
portal.consumer=${PORTAL_CONSUMER:mohana_tpp}
