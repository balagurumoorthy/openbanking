# Declarative routes/upstreams/plugins for the Bala Bank ASPSP.
# Tokens are validated against consent-auth's JWKS; scope is enforced per route group;
# limit-req protects the upstream. mTLS is configured via ssl object below (toggle by deploy).

upstreams:
  - id: bala-bank
    type: roundrobin
    nodes:
      "bala-bank:8082": 1

routes:
  # --- Account Information (AISP): requires the "accounts" scope ---
  - id: aisp
    uri: /open-banking/v3.1/aisp/*
    upstream_id: bala-bank
    plugins:
      openid-connect:
        bearer_only: true
        use_jwks: true
        discovery: "http://consent-auth:8081/.well-known/openid-configuration"
        # JWKS published by consent-auth; tokens are RS256 signed by the consent app.
        token_signing_alg_values_expected: RS256
        scope: accounts
      limit-req:
        rate: 20
        burst: 10
        rejected_code: 429
        key_type: var
        key: remote_addr

  # --- Payment Initiation (PISP): requires the "payments" scope ---
  - id: pisp
    uri: /open-banking/v3.1/pisp/*
    upstream_id: bala-bank
    plugins:
      openid-connect:
        bearer_only: true
        use_jwks: true
        discovery: "http://consent-auth:8081/.well-known/openid-configuration"
        token_signing_alg_values_expected: RS256
        scope: payments
      limit-req:
        rate: 20
        burst: 10
        rejected_code: 429
        key_type: var
        key: remote_addr

#END
