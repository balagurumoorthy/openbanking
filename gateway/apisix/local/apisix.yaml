# Template for the standalone routes/ssl document. scripts/run-apisix-local.sh inlines the
# PEM bodies (APISIX standalone requires inline cert text, not file paths) and writes the
# final apisix.yaml. Upstreams/discovery use host.docker.internal to reach host JVM services.

upstreams:
  - id: bala-bank
    type: roundrobin
    nodes:
      "host.docker.internal:8082": 1

ssls:
  - id: gateway-mtls
    snis:
      - "localhost"
      - "apisix-gateway.balabank.local"
