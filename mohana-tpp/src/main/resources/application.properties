quarkus.http.port=8080

# Upstream endpoints (overridden per environment / minikube)
tpp.client-id=mohana-tpp
tpp.client-secret=mohana-secret
tpp.redirect-uri=${TPP_REDIRECT_URI:http://localhost:8080/callback}

# Browser-facing consent-auth base (for user redirects)
auth.public-base=${AUTH_PUBLIC_BASE:http://localhost:8081}

# REST clients (server-to-server)
quarkus.rest-client.consent-auth.url=${AUTH_BASE:http://localhost:8081}
quarkus.rest-client.gateway.url=${GATEWAY_BASE:http://localhost:9080}
